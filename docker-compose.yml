version: "3.8"

services:
  neo4j:
    image: neo4j:5.26.0
    container_name: recon-neo4j
    ports:
      - "7475:7474"   # Browser UI
      - "7688:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1G"

    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  memgraph:
    image: memgraph/memgraph-mage:latest
    container_name: recon-memgraph
    ports:
      - "7689:7687"   # Bolt protocol
      - "7444:7444"   # Memgraph Lab / logs
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  lab:
    image: memgraph/lab
    container_name: recon-memgraph-lab
    ports:
      - "3000:3000"
    environment:
      QUICK_CONNECT_MG_HOST: memgraph
      QUICK_CONNECT_MG_PORT: "7687"

    depends_on:
      - memgraph

networks:
  default:
    name: recon-graphrag
